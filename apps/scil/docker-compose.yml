# SCIL Profile — Development Compose
# Usage from repo root: docker compose -f infra/docker-compose.base.yml -f apps/scil/docker-compose.yml up

services:
  # -- SCIL Backend API (FastAPI) --
  scil-backend:
    image: python:3.12-slim
    working_dir: /app/apps/scil/backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bfg:bfg_dev_2024@db:5432/bfg
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      TOKEN_HMAC_SECRET: ${TOKEN_HMAC_SECRET:-token-hmac-secret-change-in-production}
      ENVIRONMENT: development
    volumes:
      - ../../packages/core:/app/packages/core
      - ./backend:/app/apps/scil/backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: >
      sh -c "pip install -e /app/packages/core &&
             pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
