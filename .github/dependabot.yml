version: 2
updates:
  # Python backend
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "leobornhausser"

  # Python agent-service
  - package-ecosystem: "pip"
    directory: "/agent-service"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "leobornhausser"

  # Next.js frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "leobornhausser"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
