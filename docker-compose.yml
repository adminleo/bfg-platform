# BFG Platform — SCIL Development Stack
# Usage: docker compose up

services:
  # -- PostgreSQL Database (shared, schema-separated) --
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bfg
      POSTGRES_PASSWORD: bfg_dev_2024
      POSTGRES_DB: bfg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bfg"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -- Redis (Sessions, Cache, Pub/Sub) --
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -- Qdrant Vector Database (RAG) --
  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # -- SCIL Backend API (FastAPI) --
  scil-backend:
    image: python:3.12-slim
    working_dir: /app/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bfg:bfg_dev_2024@db:5432/bfg
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      ENVIRONMENT: development
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./packages/core:/app/packages/core
      - ./apps/scil/backend:/app/backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: >
      sh -c "pip install -e /app/packages/core &&
             pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # -- SCIL Frontend (Next.js) --
  scil-frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./apps/scil/frontend:/app
      - scil_frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - scil-backend

volumes:
  pgdata:
  qdrant_data:
  scil_frontend_node_modules:
