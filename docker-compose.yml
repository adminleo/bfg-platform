services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gr8hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-gr8hub}
    ports:
      - "127.0.0.1:5432:5432"   # SECURITY: bind to localhost only
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gr8hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Sessions, Cache, Pub/Sub) ──
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"   # SECURITY: bind to localhost only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Qdrant Vector Database ──
  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "127.0.0.1:6333:6333"   # SECURITY: bind to localhost only
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Backend API (FastAPI) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gr8hub}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-gr8hub}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Agent Service ──
  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/1
      QDRANT_URL: http://qdrant:6333
      BACKEND_URL: http://backend:8000
    volumes:
      - ./agent-service:/app
    depends_on:
      - redis
      - qdrant
      - backend
    command: uvicorn src.main:app --host 0.0.0.0 --port 8001 --reload
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_AGENT_URL: http://localhost:8001
      NEXT_PUBLIC_WS_URL: ws://localhost:8001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
      - agent-service
    command: npm run dev

volumes:
  pgdata:
  qdrant_data:
