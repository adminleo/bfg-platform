databases:
  - name: bfg-db
    plan: free
    databaseName: bfg
    user: bfg

services:
  - type: web
    name: scil-backend
    plan: free
    runtime: docker
    dockerfilePath: apps/scil/backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bfg-db
          property: connectionString
      - key: ENVIRONMENT
        value: demo
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: TOKEN_HMAC_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_MODE
        value: cloud
      - key: FRONTEND_URL
        sync: false
      - key: REDIS_URL
        value: ""
      - key: QDRANT_URL
        value: ""
